<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기본 정보 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* [F301] 프로필 사진 필수 조건 (원형, 그림자) */
        .profile-img {
            width: 250px;
            height: 250px;
            object-fit: cover;
        }

        /* 숫자 입력창 우측 화살표(스피너) 숨김 처리 */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body>

    <div class="bg-success text-white text-center py-3 fs-5 fw-bold">
        John Doe님의 프로필 페이지
    </div>
    
    <div class="d-flex justify-content-center mt-3 border-bottom pb-2 mb-4">
        <a href="#" class="text-success fw-bold text-decoration-none mx-3">기본 정보 수정</a>
        <a href="portfolio.html" class="text-secondary text-decoration-none mx-3">포트폴리오 수정</a>
    </div>

    <div class="container border rounded p-5 mb-5" style="max-width: 900px; background-color: #fff;">
        <h3 class="text-center mb-5">기본 정보 수정</h3>

        <div class="row text-center border-bottom pb-5 mb-5">
            
            <div class="col-md-6 mb-4 mb-md-0">
                <h5 class="mb-4">프로필 사진</h5>
                <img src="profile.jpg" class="profile-img rounded-circle shadow mb-4" alt="프로필 사진">
                
                <h5 class="mb-3">자기 소개</h5>
                <div class="input-group px-3">
                    <textarea class="form-control" rows="1" placeholder="자기 소개를 입력해주세요"></textarea>
                    <button class="btn btn-info text-white" type="button">Update</button>
                </div>
            </div>

            <div class="col-md-6 d-flex flex-column justify-content-center align-items-center">
                <div class="mb-4 w-100">
                    <h5 class="mb-3">투자상품 선호도</h5>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" id="stock"><label for="stock">주식</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" id="bond"><label for="bond">채권</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" id="realestate" checked><label for="realestate">부동산</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" id="crypto" checked><label for="crypto">가상 화폐</label>
                    </div>
                </div>

                <div class="mb-4 w-100">
                    <h5 class="mb-3">투자 스타일</h5>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="style" id="stable"><label for="stable">안정적</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="style" id="neutral"><label for="neutral">중립적</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="style" id="aggressive" checked><label for="aggressive">공격적</label>
                    </div>
                </div>

                <div class="w-100">
                    <h5 class="mb-3">관심 종목</h5>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" id="it"><label for="it">정보기술</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" id="consumer" checked><label for="consumer">소비재</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" id="finance" checked><label for="finance">금융</label>
                    </div>
                </div>
            </div>
        </div>

        <div class="px-2">
            
            <div class="mb-3">
                <label class="form-label">회원 번호</label>
                <input type="text" class="form-control bg-light" value="1" readonly>
            </div>

            <div class="mb-3">
                <label class="form-label">ID</label>
                <input type="text" class="form-control bg-light" value="김싸피" readonly>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                <div class="input-group">
                    <input type="email" class="form-control" placeholder="이메일을 설정해주세요">
                    <span class="input-group-text">@example.com</span>
                    <button class="btn btn-info text-white" type="button">Update</button>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Nickname</label>
                <div class="input-group">
                    <input type="text" class="form-control" placeholder="닉네임을 설정해주세요">
                    <button class="btn btn-info text-white" type="button">Update</button>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">나이</label>
                <div class="input-group">
                    <input type="number" class="form-control" placeholder="나이를 설정해주세요">
                    <button class="btn btn-info text-white" type="button">Update</button>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">자산과 연봉</label>
                <div class="row g-2">
                    <div class="col-md-6">
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" class="form-control" placeholder="현재 자산을 입력해주세요">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" class="form-control" placeholder="연봉을 입력해주세요">
                            <button class="btn btn-info text-white" type="button">Update</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
