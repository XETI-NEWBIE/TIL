<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포트폴리오 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 기본 폰트 및 박스 스타일 (앞 페이지와 동일하게 통일) */
        body {
            background-color: #fff;
        }
    </style>
</head>
<body>

    <div class="bg-success text-white text-center py-3 fs-5 fw-bold">
        John Doe님의 프로필 페이지
    </div>
    
    <div class="d-flex justify-content-center mt-3 border-bottom pb-2 mb-4">
        <a href="index.html" class="text-secondary text-decoration-none mx-3">기본 정보 수정</a>
        <a href="#" class="text-success fw-bold text-decoration-none mx-3">포트폴리오 수정</a>
    </div>

    <div class="container border rounded p-5 mb-5" style="max-width: 900px;">
        <h3 class="text-center mb-5">포트폴리오 수정</h3>

        <div class="px-2">
            
            <div class="mb-4">
                <label class="form-label text-secondary small">회원 번호</label>
                <input type="text" class="form-control bg-light" value="1" readonly>
            </div>

            <div class="mb-4">
                <label class="form-label text-secondary small">ID</label>
                <input type="text" class="form-control bg-light" value="김싸피" readonly>
            </div>

            <div class="mb-4">
                <label class="form-label text-secondary small">저축 성향</label>
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="savings" id="challenge">
                            <label class="form-check-label" for="challenge">도전형</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="savings" id="frugal">
                            <label class="form-check-label" for="frugal">검소형</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="savings" id="thrifty">
                            <label class="form-check-label" for="thrifty">알뜰형</label>
                        </div>
                    </div>
                    <button class="btn btn-info text-white px-4" type="button">Update</button>
                </div>
            </div>

            <div class="mb-2">
                <label class="form-label text-secondary small">최애은행</label>
                <div class="input-group">
                    <input type="text" class="form-control" placeholder="가장 좋아하는 은행을 입력해주세요">
                    <button class="btn btn-info text-white px-4" type="button">Update</button>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
