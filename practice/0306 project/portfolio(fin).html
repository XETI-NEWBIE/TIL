<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hype Boy 프로필 - 포트폴리오 수정</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hahmlet:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            font-family: "Hahmlet", serif;
            background-color: #f4f8fb;
            background-image: linear-gradient(#d9e4fc 1px, transparent 1px), linear-gradient(90deg, #d9e4fc 1px, transparent 1px);
            background-size: 20px 20px;
            color: #1a1a1a;
        }

        .retro-navbar {
            background-color: #8bb8ff;
            color: white;
            border-bottom: 3px solid #1a1a1a;
            box-shadow: 0 4px 0px #1a1a1a;
            text-shadow: 1px 1px 0px #1a1a1a;
            letter-spacing: 1px;
        }

        .tab-btn {
            background-color: #fff;
            border: 2px solid #1a1a1a;
            box-shadow: 3px 3px 0px #1a1a1a;
            border-radius: 10px;
            transition: all 0.2s;
        }
        .tab-btn:hover {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #1a1a1a;
        }
        .tab-btn.active {
            background-color: #ff9cee; 
            color: #1a1a1a;
            font-weight: 900;
        }

        .retro-box {
            background-color: #ffffff;
            border: 3px solid #1a1a1a;
            border-radius: 15px;
            box-shadow: 8px 8px 0px #ffb3c6;
        }

        .btn-update {
            background-color: #00e5ff; 
            color: #1a1a1a;
            font-weight: 900;
            border: 2px solid #1a1a1a;
            box-shadow: 3px 3px 0px #1a1a1a;
            border-radius: 8px;
            transition: all 0.1s;
        }
        .btn-update:active {
            transform: translate(3px, 3px);
            box-shadow: 0px 0px 0px #1a1a1a;
        }

        .form-control {
            border: 2px solid #1a1a1a;
            border-radius: 6px;
            font-weight: 600;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #ff9cee;
            background-color: #fff5f8;
        }

        .form-check-input { border: 2px solid #1a1a1a; }
        .form-check-input:checked {
            background-color: #ff9cee;
            border-color: #1a1a1a;
        }
    </style>
</head>
<body>

    <div class="retro-navbar text-center py-3 fs-4 fw-bold mb-4">
        ✨ John Doe's Hype Profile ✨
    </div>
    
    <div class="d-flex justify-content-center gap-3 mb-5">
        <a href="index.html" class="tab-btn text-dark text-decoration-none px-4 py-2">기본 정보 수정</a>
        <a href="#" class="tab-btn active text-decoration-none px-4 py-2">포트폴리오 수정</a>
    </div>

    <div class="container retro-box p-5 mb-5" style="max-width: 900px;">
        <h3 class="text-center fw-bold mb-5" style="text-shadow: 2px 2px 0px #8bb8ff;">포트폴리오 수정</h3>

        <div class="px-2">
            
            <div class="mb-4">
                <label class="form-label fw-bold">회원 번호</label>
                <input type="text" class="form-control bg-light text-muted" value="1" readonly>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">ID</label>
                <input type="text" class="form-control bg-light text-muted" value="김싸피" readonly>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">저축 성향</label>
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="savings" id="challenge">
                            <label class="fw-bold" for="challenge">도전형</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="savings" id="frugal">
                            <label class="fw-bold" for="frugal">검소형</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="savings" id="thrifty">
                            <label class="fw-bold" for="thrifty">알뜰형</label>
                        </div>
                    </div>
                    <button class="btn btn-update px-4" type="button">Update</button>
                </div>
            </div>

            <div class="mb-2">
                <label class="form-label fw-bold">최애은행</label>
                <div class="input-group">
                    <input type="text" class="form-control" placeholder="가장 좋아하는 은행을 입력해주세요">
                    <button class="btn btn-update px-4" type="button">Update</button>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
