{% extends "community/base.html" %}
{% block title %}비밀번호 수정 | 금융 자산 커뮤니티{% endblock %}

{% block content %}
<h1 class="page-title">비밀번호 수정</h1>
<form method="POST" style="margin-top: 1rem;">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="mt-2">
        <button type="submit" class="btn">변경하기</button>
        <a href="{% url 'accounts:profile' %}" class="btn btn-secondary">취소</a>
    </div>
</form>
{% endblock %}
