<!-- toss/templates/toss/index.html -->
{% extends 'toss/base.html' %}

{% block title %}회사 검색 | 댓글 증강 시스템{% endblock %}

{% block extra_css %}
<style>
    /* 기본 검색 및 로그 스타일 */
    .search-section { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; max-width: 700px; margin: 0 auto; }
    .search-form { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px; }
    .search-form label { font-weight: 500; font-size: 18px; color: #4e5968; }
    .search-form input { padding: 12px 16px; font-size: 16px; border: 1.5px solid #d1d6db; border-radius: 8px; width: 300px; outline: none; transition: border-color 0.2s; }
    .search-form input:focus { border-color: #3182f6; }
    .search-form button { background-color: #3182f6; color: white; border: none; padding: 13px 28px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: background-color 0.2s; }
    .search-form button:hover { background-color: #1b64da; }
    .help-text { font-size: 14px; color: #8b95a1; margin: 0; }
    
    .log-section { max-width: 700px; margin: 30px auto 0; background: #191f28; color: #00ff41; padding: 20px; border-radius: 8px; text-align: left; display: none; }
    #log-box { height: 200px; overflow-y: auto; font-family: monospace; font-size: 14px; line-height: 1.6; }
    #log-box::-webkit-scrollbar { width: 8px; }
    #log-box::-webkit-scrollbar-thumb { background: #4e5968; border-radius: 4px; }

    /* 👉 요구사항 F107: 4단 결과 UI 스타일 (그림 9 반영) */
    .result-section { max-width: 1400px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: none; }
    .result-title { text-align: center; font-size: 22px; margin-bottom: 30px; color: #191f28; }
    .columns-container { display: flex; align-items: stretch; justify-content: space-between; gap: 10px; }
    /* 4단계를 넣기 위해 폭을 23%로 조정 */
    .data-column { flex: 1; background-color: #f9fafb; border: 1px solid #e5e8eb; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; width: 23%; }
    .data-column h3 { text-align: center; font-size: 15px; color: #3182f6; margin-top: 0; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #e5e8eb; }
    .comment-list { list-style: none; padding: 0; margin: 0; overflow-y: auto; height: 450px; }
    .comment-list::-webkit-scrollbar { width: 6px; }
    .comment-list::-webkit-scrollbar-thumb { background-color: #cdd3d8; border-radius: 4px; }
    .comment-list li { font-size: 13px; line-height: 1.5; color: #4e5968; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px dashed #e5e8eb; word-break: break-all; }
    .arrow { display: flex; align-items: center; color: #b0b8c1; font-size: 20px; font-weight: bold; }
</style>
{% endblock %}

{% block content %}
<div class="search-section">
    <form id="searchForm" class="search-form" onsubmit="startStreaming(event)">
        <label for="company_name">회사 이름 입력 |</label>
        <input type="text" id="company_name" name="company_name" placeholder="예: 삼성전자" required>
        <button type="submit" id="submitBtn">검색</button>
    </form>
    <p class="help-text">- 회사명 일부만 입력하셔도 됩니다. (가장 상단의 검색결과를 자동 선택) -</p>
</div>

<!-- 실시간 로그 박스 -->
<div class="log-section" id="logSection">
    <div id="log-box"></div>
</div>

<!-- 👉 요구사항 F107: 4단 UI 컨테이너 (초기엔 숨김) -->
<div class="result-section" id="resultSection">
    <h2 class="result-title" id="resultTitle"></h2>
    <div class="columns-container">
        <!-- 1단: 원본 -->
        <div class="data-column">
            <h3 id="col1-title">원본 데이터</h3>
            <ul class="comment-list" id="col1-list"></ul>
        </div>
        <div class="arrow">&gt;</div>
        
        <!-- 2단: 전처리 -->
        <div class="data-column">
            <h3 id="col2-title">전처리 후</h3>
            <ul class="comment-list" id="col2-list"></ul>
        </div>
        <div class="arrow">&gt;</div>
        
        <!-- 3단: 증강 -->
        <div class="data-column">
            <h3 id="col3-title">증강 데이터</h3>
            <ul class="comment-list" id="col3-list"></ul>
        </div>
        <div class="arrow">&gt;</div>

        <!-- 4단: 최종 통합 결과 (F107 핵심) -->
        <div class="data-column" style="border: 2px solid #3182f6;">
            <h3 id="col4-title" style="font-weight: bold;">최종 결과</h3>
            <ul class="comment-list" id="col4-list"></ul>
        </div>
    </div>
</div>

<script>
    function startStreaming(event) {
        event.preventDefault(); 

        const companyName = document.getElementById('company_name').value;
        const logSection = document.getElementById('logSection');
        const logBox = document.getElementById('log-box');
        const submitBtn = document.getElementById('submitBtn');
        const resultSection = document.getElementById('resultSection');

        logBox.innerHTML = '';
        logSection.style.display = 'block';
        resultSection.style.display = 'none'; 
        submitBtn.disabled = true; 
        submitBtn.innerText = '수집 중...';

        const url = `/toss/run_pipeline/?company=${encodeURIComponent(companyName)}`;
        const eventSource = new EventSource(url);
        
        let isCompleted = false;

        eventSource.onmessage = function(e) {
            if (e.data.startsWith('{"status": "DONE"')) {
                isCompleted = true;
                const resultData = JSON.parse(e.data);
                
                const finalLog = document.createElement('div');
                finalLog.innerText = "[완료] 데이터 통합 및 화면 렌더링을 시작합니다.";
                logBox.appendChild(finalLog);
                
                eventSource.close();
                submitBtn.disabled = false;
                submitBtn.innerText = '검색';

                // 화면 렌더링 함수 호출
                renderResults(resultData);
                return;
            }

            const newLog = document.createElement('div');
            newLog.innerText = e.data;
            logBox.appendChild(newLog);
            logBox.scrollTop = logBox.scrollHeight;
            
            if (e.data.includes('[오류]')) {
                 eventSource.close();
                 submitBtn.disabled = false;
                 submitBtn.innerText = '검색';
            }
        };

        eventSource.onerror = function(e) {
            if (isCompleted) return; 
            
            console.error("스트리밍 에러 발생:", e);
            eventSource.close();
            submitBtn.disabled = false;
            submitBtn.innerText = '검색';
            
            const errorLog = document.createElement('div');
            errorLog.style.color = 'red';
            errorLog.innerText = "[시스템] 서버와의 연결이 끊어졌습니다.";
            logBox.appendChild(errorLog);
        };
    }

    // JSON 데이터를 받아서 화면에 4단 리스트로 뿌려주는 함수
    function renderResults(data) {
        const resultSection = document.getElementById('resultSection');
        
        // F107: 전처리 데이터와 증강 데이터를 합쳐서 통합 결과 집합 생성
        const integratedData = [...data.cleaned, ...data.augmented];
        
        document.getElementById('resultTitle').innerText = `${data.company} 댓글 분석 결과`;
        document.getElementById('col1-title').innerText = `원본 데이터 (${data.original.length}개)`;
        document.getElementById('col2-title').innerText = `전처리 후 (${data.cleaned.length}개)`;
        document.getElementById('col3-title').innerText = `증강 데이터 (${data.augmented.length}개)`;
        document.getElementById('col4-title').innerText = `최종 결과 (${integratedData.length}개)`;

        const list1 = document.getElementById('col1-list');
        const list2 = document.getElementById('col2-list');
        const list3 = document.getElementById('col3-list');
        const list4 = document.getElementById('col4-list');
        
        list1.innerHTML = ''; list2.innerHTML = ''; list3.innerHTML = ''; list4.innerHTML = '';

        data.original.forEach((text, i) => list1.innerHTML += `<li>${i+1}. ${text}</li>`);
        data.cleaned.forEach((text, i) => list2.innerHTML += `<li>${i+1}. ${text}</li>`);
        data.augmented.forEach((text, i) => list3.innerHTML += `<li>${i+1}. ${text}</li>`);
        integratedData.forEach((text, i) => list4.innerHTML += `<li>${i+1}. ${text}</li>`);

        resultSection.style.display = 'block'; // 4단 UI 표시
    }
</script>
{% endblock content %}
