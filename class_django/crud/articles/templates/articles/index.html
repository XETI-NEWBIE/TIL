{% extends "base.html" %}


{% block content %}
<h1>Articles</h1>
<div>
  <a href="{% url "articles:create" %}">CREATE</a>
</div>
<hr>
{% for article in articles %}
<div>
  <p>글 번호: {{ article.pk }}</p>
  <p>글 제목: {{ article.title }}</p>
  <p>글 내용: {{ article.content }}</p>
</div>
<hr>
{% endfor %}
{% endblock content %}
