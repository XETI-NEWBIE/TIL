{% extends 'base.html' %}

{% block content %}
  <h3>hello, {{ user.username }}</h3>
  
  <a href="{% url 'accounts:login' %}">[LOGIN]</a>
  
  <form action="{% url 'accounts:logout' %}" method="POST" style="display: inline;">
    {% csrf_token %}
    <input type="submit" value="LOGOUT">
  </form>

  <br><br>

  <h2>전체 유저 목록</h2>
  <ul>
    {% for u in users %}
      <li>{{ u.username }}</li>
      <hr>
    {% endfor %}
  </ul>
{% endblock content %}
