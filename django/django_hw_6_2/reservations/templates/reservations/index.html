{% extends 'base.html' %}

{% block content %}
  <h1>예약 서비스</h1>
  
  <a href="{% url 'reservations:new' %}">[예약 하기]</a>
  <hr>
  
  <ul>
    {% for reservation in reservations %}
      <li>
        예약자명 : {{ reservation.name }} <br>
        예약일자 : {{ reservation.date }}
      </li>
    {% endfor %}
  </ul>
{% endblock content %}
